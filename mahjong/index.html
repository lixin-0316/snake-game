<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>广东麻将</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a1a;display:flex;justify-content:center;align-items:center;min-height:100dvh;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
.game-wrapper{background:linear-gradient(145deg,#2d1a2d,#1a0a1a);padding:15px;border-radius:16px;box-shadow:0 0 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05)}
canvas{display:block;margin:0 auto;border-radius:10px;touch-action:none;width:100%;max-width:800px}
@media(min-width:768px){canvas{max-width:1200px}}
.btns{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.btns button{padding:10px 28px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;display:none}
.btns button.show{display:inline-block}
.btn-draw{background:linear-gradient(135deg,#f0c040,#d4a830);color:#333}
.btn-draw:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(240,192,64,.4)}
.btn-win{background:linear-gradient(135deg,#e94560,#c23152);color:#fff}
.btn-win:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(233,69,96,.4)}
.btn-pass{background:linear-gradient(135deg,#666,#444);color:#fff}
.btn-pass:hover{transform:translateY(-2px)}
.btn-discard{background:linear-gradient(135deg,#5dade2,#2e86c1);color:#fff}
.btn-discard:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(93,173,226,.4)}
.btn-reset{background:linear-gradient(135deg,#53d769,#2ecc71);color:#fff}
.btn-reset:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(83,215,105,.4)}
.info-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 10px;color:rgba(255,255,255,.6);font-size:14px}
.back-link{display:inline-flex;align-items:center;gap:4px;color:rgba(255,255,255,.4);font-size:13px;text-decoration:none}
.back-link:hover{color:#e94560}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="info-bar">
    <a href="../" class="back-link">← 返回平台</a>
    <span>🀄 广东麻将·带红中</span>
    <span id="infoRight"></span>
  </div>
  <canvas id="game" width="800" height="560"></canvas>
  <div class="btns" id="btns">
    <button class="btn-draw" id="drawBtn">摸牌</button>
    <button class="btn-win" id="winBtn">胡牌</button>
    <button class="btn-pass" id="passBtn">过</button>
    <button class="btn-discard" id="discardBtn">出牌</button>
    <button class="btn-reset" id="resetBtn">重新开始</button>
  </div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=800,H=560;
const TW=42,TH=56;

const TYPES=['wan','tiao','tong','feng','jian'];
const TYPE_NAMES={wan:'万',tiao:'索',tong:'筒',feng:'风',jian:'箭'};
const WAN=['一','二','三','四','五','六','七','八','九'];
const TIAO=['一','二','三','四','五','六','七','八','九'];
const TONG=['一','二','三','四','五','六','七','八','九'];
const FENG=['東','南','西','北'];
const JIAN=['中','發','白'];
const SUIT_COLORS={wan:'#27ae60',tiao:'#2980b9',tong:'#e74c3c',feng:'#8e44ad',jian:'#e67e22'};

function createTiles(){
  const tiles=[];
  for(let i=0;i<4;i++){
    for(let w=0;w<9;w++)tiles.push({type:'wan',val:w,id:tiles.length});
    for(let t=0;t<9;t++)tiles.push({type:'tiao',val:t,id:tiles.length});
    for(let o=0;o<9;o++)tiles.push({type:'tong',val:o,id:tiles.length});
    for(let f=0;f<4;f++)tiles.push({type:'feng',val:f,id:tiles.length});
    for(let j=0;j<3;j++)tiles.push({type:'jian',val:j,id:tiles.length});
  }
  return tiles;
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function tileName(t){
  if(t.type==='wan')return WAN[t.val]+'萬';
  if(t.type==='tiao')return TIAO[t.val]+'條';
  if(t.type==='tong')return TONG[t.val]+'筒';
  if(t.type==='feng')return FENG[t.val];
  return JIAN[t.val];
}

function tileKey(t){return t.type+'_'+t.val;}

function sortTiles(ts){
  const order={wan:0,tiao:1,tong:2,feng:3,jian:4};
  return ts.sort((a,b)=>order[a.type]-order[b.type]||a.val-b.val);
}

function isRedMiddle(t){return t.type==='jian'&&t.val===0;}

let wall,hands,playerHand,discards,turn,gameOver,msg,drawTile,canWin,phase,lastDiscard,selectedDiscard;
let dealer=0;

let sharedAc,audioReady;
function getAc(){
  if(!sharedAc||sharedAc.state==='closed')sharedAc=new(window.AudioContext||window.webkitAudioContext)();
  if(sharedAc.state==='suspended')sharedAc.resume();
  return sharedAc;
}
function initAudio(){getAc();audioReady=1;}
function playSound(f,d,t){
  if(!audioReady)return;
  try{
    const ac=getAc();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=t||'sine';o.frequency.setValueAtTime(f,ac.currentTime);
    g.gain.setValueAtTime(0.15,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
    o.connect(g);g.connect(ac.destination);
    o.start(ac.currentTime);o.stop(ac.currentTime+d);
  }catch(e){}
}
function speak(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='zh-CN';u.rate=.9;speechSynthesis.speak(u)}catch(e){}}
function tileVoice(t){return isRedMiddle(t)?'红中':tileName(t)}
function playDrawSound(t){playSound(500,0.08,'sine');setTimeout(()=>playSound(700,0.06,'sine'),50);if(t)speak(tileVoice(t))}
function playDiscardSound(t){playSound(300,0.15,'square');if(t)speak(tileVoice(t))}
function playWinSound(){playSound(600,0.1,'sine');setTimeout(()=>playSound(800,0.1,'sine'),120);setTimeout(()=>playSound(1000,0.15,'sine'),240);speak('胡牌了')}

function initGame(){
  wall=shuffle(createTiles());
  hands=[sortTiles(wall.splice(0,13)),sortTiles(wall.splice(0,13)),
         sortTiles(wall.splice(0,13)),sortTiles(wall.splice(0,13))];
  // dealer draws 14th
  hands[0].push(wall.pop());
  sortTiles(hands[0]);
  playerHand=hands[0];
  discards=[[],[],[],[]];
  turn=0;gameOver=false;drawTile=null;canWin=false;phase='play';lastDiscard=null;selectedDiscard=-1;
  msg='游戏开始，自动摸牌中...';
  document.getElementById('drawBtn').className='btn-draw';
  document.getElementById('winBtn').className='btn-win';
  document.getElementById('passBtn').className='btn-pass';
  document.getElementById('discardBtn').className='btn-discard';
  document.getElementById('resetBtn').className='btn-reset';
  document.getElementById('infoRight').textContent='剩余: '+wall.length+' 张';
  render();
  setTimeout(autoDraw,400);
}

function isWin(tiles,wilds){
  if(tiles.length%3!==2)return false;
  const groups={};
  tiles.forEach(t=>{
    const k=tileKey(t);
    groups[k]=(groups[k]||0)+1;
  });

  let wildCount=0;
  if(groups['jian_0']){wildCount=groups['jian_0'];delete groups['jian_0'];}

  const keys=Object.keys(groups).sort();
  function canFormMelds(g,idx,wc){
    if(idx>=keys.length)return true;
    const k=keys[idx];
    if(g[k]<=0)return canFormMelds(g,idx+1,wc);

    // try pair (only once)
    if(g[k]>=2){
      g[k]-=2;
      const rest={...g};
      if(canFormMelds(rest,idx,wc))return true;
      g[k]+=2;
    }
    // try wild pair
    if(wc>0){
      wc--;
      g[k]--;
      const rest={...g};
      if(canFormMelds(rest,idx,wc))return true;
      wc++;
      g[k]++;
    }

    // try triplet
    if(g[k]>=3){
      g[k]-=3;
      const rest={...g};
      if(canFormMelds(rest,idx,wc))return true;
      g[k]+=3;
    }
    // try wild triplet
    if(wc>=2&&g[k]>=1){
      wc-=2;g[k]-=1;
      const rest={...g};
      if(canFormMelds(rest,idx,wc))return true;
      wc+=2;g[k]+=1;
    }
    if(wc>=1&&g[k]>=2){
      wc-=1;g[k]-=2;
      const rest={...g};
      if(canFormMelds(rest,idx,wc))return true;
      wc+=1;g[k]+=2;
    }

    // try sequence (wan, tiao, tong only)
    if(k.startsWith('wan_')||k.startsWith('tiao_')||k.startsWith('tong_')){
      const parts=k.split('_');
      const v=parseInt(parts[1]);
      if(v<=6){
        const k2=parts[0]+'_'+(v+1),k3=parts[0]+'_'+(v+2);
        const c2=g[k2]||0,c3=g[k3]||0;
        // no wilds
        if(c2>0&&c3>0){
          g[k]--;g[k2]--;g[k3]--;
          const rest={...g};
          if(canFormMelds(rest,idx,wc))return true;
          g[k]++;g[k2]++;g[k3]++;
        }
        // 1 wild
        if(wc>=1){
          if(c2>0){g[k]--;g[k2]--;wc--;const rest={...g};if(canFormMelds(rest,idx,wc))return true;g[k]++;g[k2]++;wc++;}
          if(c3>0){g[k]--;g[k3]--;wc--;const rest={...g};if(canFormMelds(rest,idx,wc))return true;g[k]++;g[k3]++;wc++;}
        }
        // 2 wilds
        if(wc>=2){
          wc-=2;g[k]--;
          const rest={...g};
          if(canFormMelds(rest,idx,wc))return true;
          wc+=2;g[k]++;
        }
      }
    }

    return false;
  }

  // Try each pair, check if rest can form 4 melds
  const total=tiles.length;
  const requiredMelds=(total-2)/3;
  // If we have wilds, we need fewer total tiles to form melds
  // Actually just try the standard algorithm with wild substitutions

  for(let i=0;i<keys.length;i++){
    const k=keys[i];
    if(groups[k]>=2){
      groups[k]-=2;
      if(canFormMelds(groups,0,wildCount)){groups[k]+=2;return true;}
      groups[k]+=2;
    }
    if(wildCount>0){
      wildCount--;groups[k]--;
      if(canFormMelds(groups,0,wildCount)){wildCount++;groups[k]++;return true;}
      wildCount++;groups[k]++;
    }
  }
  if(wildCount>=2){
    wildCount-=2;
    if(canFormMelds(groups,0,wildCount)){wildCount+=2;return true;}
    wildCount+=2;
  }

  return false;
}

function checkWin(hand,includeDraw){
  const test=includeDraw&&drawTile?[...hand,drawTile]:[...hand];
  const wilds=test.filter(t=>isRedMiddle(t)).length;
  return isWin(test,wilds);
}

function aiDiscard(hand){
  const scored=hand.filter(t=>!isRedMiddle(t)).map(t=>{
    const k=tileKey(t);
    const cnt=hand.filter(h=>tileKey(h)===k).length;
    let score=cnt*10;
    if(t.type==='wan'||t.type==='tiao'||t.type==='tong'){
      const v=t.val;
      if(v>=3&&v<=7)score+=6;
      else if(v===2||v===8)score+=3;
      else score+=1;
      const neighbors=hand.filter(h=>h.type===t.type&&Math.abs(h.val-v)<=2);
      score+=neighbors.length*3;
    }else{
      score+=1;
    }
    return{tile:t,score};
  });
  scored.sort((a,b)=>a.score-b.score||a.tile.id-b.tile.id);
  return scored.length>0?scored[0].tile:hand[0];
}

function doAITurn(){
  if(gameOver||turn===0)return;
  if(wall.length===0){msg='流局！平局';gameOver=true;render();showReset();return;}

  const tile=wall.pop();
  document.getElementById('infoRight').textContent='剩余: '+wall.length+' 张';

  if(isWin([...hands[turn],tile],hands[turn].filter(t=>isRedMiddle(t)).length+(isRedMiddle(tile)?1:0))){
    msg=`AI玩家${turn+1} 胡牌了！`;
    gameOver=true;playWinSound();render();showReset();return;
  }

  hands[turn].push(tile);
  const discard=aiDiscard(hands[turn]);
  const idx=hands[turn].indexOf(discard);
  if(idx!==-1)hands[turn].splice(idx,1);
  discards[turn].push(discard);
  if(turn!==0)lastDiscard=discard;
  sortTiles(hands[turn]);
  if(turn!==0)playDiscardSound(discard);

  turn=(turn+1)%4;
  if(turn===0){
    drawTile=null;
    document.getElementById('drawBtn').className='btn-draw';
    render();
    setTimeout(autoDraw,400);
  }else{
    render();
    setTimeout(doAITurn,600);
  }
}

function handleDraw(){
  if(gameOver||turn!==0||phase!=='play')return;
  if(wall.length===0){msg='流局！平局';gameOver=true;render();showReset();return;}

  drawTile=wall.pop();
  document.getElementById('infoRight').textContent='剩余: '+wall.length+' 张';
  canWin=isWin(playerHand,playerHand.filter(t=>isRedMiddle(t)).length+(isRedMiddle(drawTile)?1:0));
  playDrawSound(drawTile);

  document.getElementById('drawBtn').className='btn-draw';
  if(canWin)document.getElementById('winBtn').className='btn-win show';
  document.getElementById('passBtn').className='btn-pass show';
  document.getElementById('discardBtn').className='btn-discard';
  msg=canWin?'你可以胡牌！或选牌后点出牌':'选一张手牌，点「出牌」弃掉';
  render();
}

function autoDraw(){
  if(gameOver||turn!==0||phase!=='play')return;
  handleDraw();
}

function handleWin(){
  if(gameOver||!canWin)return;
  initAudio();
  playerHand.push(drawTile);
  sortTiles(playerHand);
  msg='你胡牌了！🎉';
  gameOver=true;selectedDiscard=-1;
  playWinSound();
  document.getElementById('drawBtn').className='btn-draw';
  document.getElementById('winBtn').className='btn-win';
  document.getElementById('passBtn').className='btn-pass';
  document.getElementById('discardBtn').className='btn-discard';
  showReset();
  render();
}

function handlePass(){
  if(gameOver||!drawTile||turn!==0)return;
  initAudio();
  playerHand.push(drawTile);
  sortTiles(playerHand);
  const discard=aiDiscard(playerHand);
  const idx=playerHand.indexOf(discard);
  if(idx!==-1){
    playerHand.splice(idx,1);
    discards[0].push(discard);
    lastDiscard=discard;
  }
  playDiscardSound(discard);
  document.getElementById('winBtn').className='btn-win';
  document.getElementById('passBtn').className='btn-pass';
  document.getElementById('discardBtn').className='btn-discard';
  drawTile=null;canWin=false;selectedDiscard=-1;
  turn=1;
  msg='你弃掉了 '+tileName(discard);
  render();
  setTimeout(doAITurn,500);
}

function handleDiscard(){
  if(gameOver||!drawTile||turn!==0||selectedDiscard===-1)return;
  initAudio();
  const tile=playerHand[selectedDiscard];
  playerHand.push(drawTile);
  sortTiles(playerHand);
  const idx=playerHand.indexOf(tile);
  if(idx!==-1){
    playerHand.splice(idx,1);
    discards[0].push(tile);
    lastDiscard=tile;
  }
  playDiscardSound(tile);
  document.getElementById('winBtn').className='btn-win';
  document.getElementById('passBtn').className='btn-pass';
  document.getElementById('discardBtn').className='btn-discard';
  drawTile=null;canWin=false;selectedDiscard=-1;
  turn=1;
  msg='你弃掉了 '+tileName(tile);
  render();
  setTimeout(doAITurn,500);
}

function showReset(){
  document.getElementById('resetBtn').className='btn-reset show';
}

function render(){
  ctx.clearRect(0,0,W,H);
  const grd=ctx.createRadialGradient(400,280,50,400,280,320);
  grd.addColorStop(0,'#3d1a3d');grd.addColorStop(1,'#1a0a1a');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // top player (AI 3)
  const topY=8;
  const ai3Hand=hands[3]||[];
  for(let i=0;i<ai3Hand.length;i++){
    const x=300+i*16;
    ctx.fillStyle='#2a1a5a';ctx.shadowBlur=3;ctx.shadowColor='rgba(0,0,0,.15)';
    roundRect(x,topY,TW-2,TH-2,3);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.1)';ctx.font='10px serif';ctx.textAlign='center';
    ctx.fillText('🀄',x+12,topY+25);
  }
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('AI-3',370,topY+TH+14);

  // left player (AI 2)
  const leftX=8;
  for(let i=0;i<(hands[2]||[]).length;i++){
    const y=130+i*16;
    ctx.fillStyle='#2a1a5a';ctx.shadowBlur=3;ctx.shadowColor='rgba(0,0,0,.15)';
    roundRect(leftX,y,TW-2,TH-2,3);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.1)';ctx.font='10px serif';ctx.textAlign='center';
    ctx.fillText('🀄',leftX+12,y+25);
  }
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('AI-2',leftX+15,130+TH+14);

  // right player (AI 4)
  const rightX=740;
  for(let i=0;i<(hands[3]||[]).length;i++){
    const y=130+i*16;
    ctx.fillStyle='#2a1a5a';ctx.shadowBlur=3;ctx.shadowColor='rgba(0,0,0,.15)';
    roundRect(rightX,y,TW-2,TH-2,3);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.1)';ctx.font='10px serif';ctx.textAlign='center';
    ctx.fillText('🀄',rightX+12,y+25);
  }
  // Actually AI-4 is top, AI-2 left, AI-3 right... let me fix labels

  // fix labels - player 1 = bottom, 2 = left, 3 = top, 0 = right (but turn order is 0,1,2,3)
  // Let me redo: turn: 0=player(bottom), 1=AI-left(or right), 2=AI-top, 3=AI-right(or left)
  // discard areas
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='11px sans-serif';ctx.textAlign='left';
  ctx.fillText('AI-1',leftX+15,130+TH+14);
  ctx.textAlign='center';
  ctx.fillText('AI-4',730,topY+TH+14);
  ctx.fillText('AI-3',760,130+TH+14);

  const sx=Math.max(10,400-playerHand.length*30);
  playerHand.forEach((t,i)=>{
    const x=sx+i*30;
    drawTileUI(x,i===selectedDiscard?430:450,t,true,i===selectedDiscard);
  });

  if(drawTile){
    drawTileUI(360,390,drawTile,true);
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('摸到的牌',360,460);
  }

  // discard areas - show last 3 tiles from each player
  const positions=[{x:340,y:235},{x:80,y:210},{x:340,y:75},{x:620,y:210}];
  const labels=['你','AI-1','AI-4','AI-3'];
  for(let p=0;p<4;p++){
    if(discards[p]&&discards[p].length>0){
      const arr=discards[p];
      const show=arr.slice(-3);
      show.forEach((t,i)=>{
        const xx=positions[p].x+i*36;
        ctx.globalAlpha=p===0?1:0.6;
        drawTileUI(xx,positions[p].y,t,true);
        ctx.globalAlpha=1;
      });
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText(labels[p],positions[p].x+show.length*18,positions[p].y+TH+10);
    }
  }

  // message
  if(msg){
    ctx.fillStyle='rgba(0,0,0,.5)';roundRect(200,170,400,36,8);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='15px sans-serif';ctx.textAlign='center';
    ctx.fillText(msg,400,194);
  }

  if(gameOver&&msg.includes('胡牌')){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f0c040';ctx.font='bold 40px sans-serif';ctx.textAlign='center';
    ctx.fillText(msg,400,280);
    ctx.fillStyle='#fff';ctx.font='16px sans-serif';
    ctx.fillText(turn===0?'你的手牌: '+playerHand.map(tileName).join(', '):'',400,330);
  }
}

function drawTileUI(x,y,t,faceUp,selected){
  ctx.shadowBlur=selected?15:3;ctx.shadowColor=selected?'rgba(93,173,226,.6)':'rgba(0,0,0,.15)';
  ctx.fillStyle='#faf5e8';roundRect(x,y,TW-2,TH-2,4);ctx.fill();ctx.shadowBlur=0;
  if(selected){ctx.strokeStyle='#5dade2';ctx.lineWidth=2;roundRect(x,y,TW-2,TH-2,4);ctx.stroke();}
  if(faceUp){
    const col=t.type==='wan'?'#27ae60':t.type==='tiao'?'#2980b9':t.type==='tong'?'#e74c3c':t.type==='feng'?'#8e44ad':'#e67e22';
    ctx.fillStyle=col;ctx.font='bold 16px serif';ctx.textAlign='center';
    let label=tileName(t);
    if(t.type==='jian'){
      if(t.val===0)label='🀄';else if(t.val===1)label='發';else label='白';
    }else if(t.type==='feng'){
      label=FENG[t.val];
    }else{
      const chars=tileName(t);
      ctx.font='bold 13px serif';
      ctx.fillText(chars.slice(0,1),x+15,y+25);
      ctx.font='11px serif';
      ctx.fillText(chars.slice(1),x+15,y+42);
      return;
    }
    ctx.fillText(label,x+15,y+33);
    if(isRedMiddle(t)){
      ctx.fillStyle='rgba(231,76,60,.15)';
      ctx.beginPath();ctx.arc(x+15,y+25,12,0,Math.PI*2);ctx.fill();
    }
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

canvas.addEventListener('click',e=>{
  if(gameOver||turn!==0||!drawTile||phase!=='play')return;
  initAudio();
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;
  const mx=(e.clientX-rect.left)*scaleX,my=(e.clientY-rect.top)*scaleY;

  const sx=Math.max(10,400-playerHand.length*30);
  for(let i=0;i<playerHand.length;i++){
    const cx=sx+i*30;
    if(mx>=cx&&mx<=cx+TW&&my>=430&&my<=450+TH){
      selectedDiscard=selectedDiscard===i?-1:i;
      document.getElementById('discardBtn').className=selectedDiscard!==-1?'btn-discard show':'btn-discard';
      render();
      break;
    }
  }
});

document.getElementById('drawBtn').onclick=function(){initAudio();handleDraw();};
document.getElementById('winBtn').onclick=handleWin;
document.getElementById('passBtn').onclick=handlePass;
document.getElementById('discardBtn').onclick=handleDiscard;
document.getElementById('resetBtn').onclick=initGame;

initGame();
</script>
