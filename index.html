<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我的平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08081a;color:#e0e0e0;font-family:'Segoe UI',Arial,sans-serif;min-height:100dvh;overflow-x:hidden}

/* animated background */
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;overflow:hidden}
.bg span{position:absolute;display:block;width:20px;height:20px;background:rgba(233,69,96,.04);border-radius:50%;animation:float 20s infinite}
.bg span:nth-child(1){top:10%;left:20%;width:80px;height:80px;animation-delay:0s;animation-duration:18s}
.bg span:nth-child(2){top:60%;left:80%;width:120px;height:120px;animation-delay:3s;animation-duration:25s}
.bg span:nth-child(3){top:30%;left:70%;width:60px;height:60px;animation-delay:6s;animation-duration:15s}
.bg span:nth-child(4){top:80%;left:30%;width:100px;height:100px;animation-delay:2s;animation-duration:22s}
.bg span:nth-child(5){top:50%;left:50%;width:40px;height:40px;animation-delay:8s;animation-duration:20s}
@keyframes float{0%,100%{transform:translateY(0) scale(1);opacity:.3}50%{transform:translateY(-80px) scale(1.2);opacity:.6}}

.header{text-align:center;padding:50px 20px 30px;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,#e94560,transparent)}
.header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#e94560,#f0c040);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;letter-spacing:2px}
.header p{font-size:14px;color:#555;letter-spacing:4px;text-transform:uppercase}

.channels{max-width:560px;margin:30px auto;padding:0 16px;display:grid;gap:10px}
.channel{display:flex;align-items:center;background:linear-gradient(135deg,rgba(26,26,62,.8),rgba(22,22,62,.5));border-radius:14px;padding:18px 20px;text-decoration:none;color:#e0e0e0;transition:all .3s;border:1px solid rgba(255,255,255,.04);backdrop-filter:blur(10px)}
.channel.active{cursor:pointer}
.channel.active:hover{transform:translateY(-3px);border-color:rgba(233,69,96,.3);box-shadow:0 8px 30px rgba(233,69,96,.12)}
.channel.disabled{opacity:.3;pointer-events:none;filter:grayscale(1)}
.channel .icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-right:16px;flex-shrink:0;position:relative}
.channel .icon.snake{background:linear-gradient(135deg,#1a3a1a,#2d5a2d);box-shadow:0 0 20px rgba(83,215,105,.15)}
.channel.active:hover .icon.snake{box-shadow:0 0 30px rgba(83,215,105,.25)}
.channel .icon.snake::after{content:'';position:absolute;inset:-2px;border-radius:14px;background:linear-gradient(135deg,#53d769,transparent);opacity:.3;z-index:-1}
.channel .icon.empty{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.08)}
.channel .info{flex:1;min-width:0}
.channel .info h3{font-size:16px;font-weight:600;margin-bottom:2px}
.channel .info span{font-size:12px;color:#555}
.channel .tag{margin-left:auto;font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(233,69,96,.15);color:#e94560;font-weight:600;letter-spacing:.5px}
.channel .tag.coming{background:rgba(255,255,255,.04);color:#444}

.footer{text-align:center;padding:40px;font-size:12px;color:#333;letter-spacing:1px}
.footer span{color:#e94560}
</style>
</head>
<body>
<div class="bg">
  <span></span><span></span><span></span><span></span><span></span>
</div>
<div class="header">
  <h1>我的平台</h1>
  <p>选择频道</p>
</div>
<div class="channels">
  <a href="snake/" class="channel active">
    <div class="icon snake">🐑</div>
    <div class="info">
      <h3>贪吃懒洋洋</h3>
      <span>贪吃懒洋洋，和小羊一起冒险</span>
    </div>
    <div class="tag">已上线</div>
  </a>
  <a href="snake-new/" class="channel active">
    <div class="icon" style="background:linear-gradient(135deg,#1a3a1a,#2d5a2d);box-shadow:0 0 20px rgba(83,215,105,.15)">🐍</div>
    <div class="info">
      <h3>贪吃蛇（手机版）</h3>
      <span>手机版，横屏摇杆+加速</span>
    </div>
    <div class="tag">已上线</div>
  </a>
  <a href="xiuxian/" class="channel active">
    <div class="icon" style="background:linear-gradient(135deg,#2a1a0a,#5a3d1a);box-shadow:0 0 20px rgba(240,192,64,.15)">🧘</div>
    <div class="info">
      <h3>文字修仙</h3>
      <span>文字修仙，一念成仙</span>
    </div>
    <div class="tag">已上线</div>
  </a>
  <a href="doudizhu/" class="channel active">
    <div class="icon" style="background:linear-gradient(135deg,#2a1a5a,#4a2a8a);box-shadow:0 0 20px rgba(138,43,226,.15)">🃏</div>
    <div class="info">
      <h3>斗地主</h3>
      <span>经典三人斗地主，人机对战</span>
    </div>
    <div class="tag">已上线</div>
  </a>
  <a href="mahjong/" class="channel active">
    <div class="icon" style="background:linear-gradient(135deg,#3d1a3d,#6d2a6d);box-shadow:0 0 20px rgba(200,50,200,.15)">🀄</div>
    <div class="info">
      <h3>广东麻将</h3>
      <span>广东麻将带红中，人机对战</span>
    </div>
    <div class="tag">已上线</div>
  </a>
  <a href="xiuxian/semi-text/" class="channel active">
    <div class="icon" style="background:linear-gradient(135deg,#2a1a3a,#5a2a6a);box-shadow:0 0 20px rgba(192,132,252,.15)">🎨</div>
    <div class="info">
      <h3>半文字修仙</h3>
      <span>场景化文字修仙，视觉小说体验</span>
    </div>
    <div class="tag">已上线</div>
  </a>
  <a href="xiuxian/graphical/" class="channel active">
    <div class="icon" style="background:linear-gradient(135deg,#0a2a3a,#1a5a6a);box-shadow:0 0 20px rgba(127,219,255,.15)">🌄</div>
    <div class="info">
      <h3>图形修仙</h3>
      <span>图形化修仙世界，自由探索</span>
    </div>
    <div class="tag">已上线</div>
  </a>
  <div class="channel disabled">
    <div class="icon empty">❓</div>
    <div class="info">
      <h3>更多</h3>
      <span>更多游戏即将上线</span>
    </div>
    <div class="tag coming">待定</div>
  </div>
</div>
<div class="footer">Made with <span>❤</span></div>
</body>
</html>
