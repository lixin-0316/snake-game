<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我的平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f23;color:#e0e0e0;font-family:'Segoe UI',Arial,sans-serif;min-height:100dvh}
.header{text-align:center;padding:40px 20px 20px;background:linear-gradient(135deg,#1a1a3e,#16213e)}
.header h1{font-size:28px;color:#e94560;margin-bottom:6px}
.header p{font-size:14px;color:#888}
.channels{max-width:600px;margin:20px auto;padding:0 16px;display:grid;gap:12px}
.channel{display:flex;align-items:center;background:#1a1a3e;border-radius:12px;padding:16px;text-decoration:none;color:#e0e0e0;transition:.2s;border:1px solid transparent}
.channel:hover{background:#16213e;border-color:#e94560;transform:translateY(-2px)}
.channel.active{cursor:pointer}
.channel.disabled{opacity:.4;pointer-events:none}
.channel .icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-right:14px;flex-shrink:0}
.channel .icon.snake{background:linear-gradient(135deg,#53d769,#2ecc71)}
.channel .icon.empty{background:#2a2a4a}
.channel .info h3{font-size:16px;margin-bottom:3px}
.channel .info span{font-size:12px;color:#666}
.channel .badge{margin-left:auto;font-size:11px;padding:3px 8px;border-radius:6px;background:#e94560;color:#fff}
.footer{text-align:center;padding:30px;font-size:12px;color:#444}
</style>
</head>
<body>
<div class="header">
  <h1>🎮 我的平台</h1>
  <p>选择你想玩的频道</p>
</div>
<div class="channels">
  <a href="snake/" class="channel active">
    <div class="icon snake">🐍</div>
    <div class="info">
      <h3>贪吃蛇</h3>
      <span>经典街机游戏</span>
    </div>
    <div class="badge">已上线</div>
  </a>
  <div class="channel disabled">
    <div class="icon empty">❓</div>
    <div class="info">
      <h3>频道 2</h3>
      <span>即将上线</span>
    </div>
  </div>
  <div class="channel disabled">
    <div class="icon empty">❓</div>
    <div class="info">
      <h3>频道 3</h3>
      <span>即将上线</span>
    </div>
  </div>
  <div class="channel disabled">
    <div class="icon empty">❓</div>
    <div class="info">
      <h3>频道 4</h3>
      <span>即将上线</span>
    </div>
  </div>
</div>
<div class="footer">Made with ❤️</div>
</body>
</html>
