<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>半文修仙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08081a;color:#e0dcd0;font-family:'Segoe UI','Microsoft YaHei',sans-serif;user-select:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;position:relative}

/* Scene container */
#scene{flex:1;position:relative;overflow:hidden;min-height:0;border-bottom:2px solid;transition:border-color .8s}
#scene-bg{position:absolute;inset:0;transition:background 1.8s ease}
#scene-elements{position:absolute;inset:0}
#scene-elements>*{position:absolute}

/* Character */
#character{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);font-size:3rem;z-index:10;transition:all .5s;text-shadow:0 0 10px rgba(255,255,255,.2);line-height:1}
#character.pos-scene0{bottom:22%}
#character.pos-scene1{bottom:24%;left:48%}
#character.pos-scene2{bottom:30%;left:50%}
#character.pos-scene3{bottom:38%;left:52%}
#character.pos-scene4{bottom:28%;left:50%}
#character.exploring{transform:translateX(60%)scaleX(-1)}
#character.glow{filter:brightness(1.6)drop-shadow(0 0 24px gold);animation:charPulse .6s ease infinite alternate}
#character.training{bottom:16%;transform:translateX(-50%)scale(.9)}
#character.hurt{animation:charHurt .4s ease 2}
@keyframes charPulse{to{filter:brightness(2)drop-shadow(0 0 48px orange)}}
@keyframes charHurt{0%,100%{transform:translateX(-50%)}25%{transform:translateX(-55%)}75%{transform:translateX(-45%)}}

/* Realm label above character */
#realm-label{position:absolute;bottom:36%;left:50%;transform:translateX(-50%);font-size:.65rem;color:rgba(255,215,0,.5);z-index:11;opacity:0;transition:opacity .6s;white-space:nowrap;text-shadow:0 0 8px rgba(0,0,0,.8);pointer-events:none}
#realm-label.show{opacity:1}

/* Flash overlay */
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:100;transition:opacity .05s}
#flash.active{opacity:.85}
#flash.fade{opacity:0;transition:opacity .6s}
#flash.golden{background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700)}

/* Scene transition wrap effect */
#scene-wrap{position:absolute;inset:0;z-index:60;pointer-events:none;opacity:0;transition:opacity .8s}
#scene-wrap.active{opacity:1}
#scene-wrap .swirl{position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.15),transparent);transform:translate(-50%,-50%);animation:swirlExpand .8s ease-out forwards}
@keyframes swirlExpand{0%{width:0;height:0;opacity:1}100%{width:400px;height:400px;opacity:0}}

/* Event overlay */
#event-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;pointer-events:none;opacity:0;transition:opacity .4s}
#event-overlay.active{opacity:1}
#event-text{background:rgba(0,0,0,.85);border:1px solid rgba(255,215,0,.4);border-radius:14px;padding:20px 28px;font-size:1.1rem;color:#ffd700;text-align:center;max-width:88%;line-height:1.6;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;animation:typing .6s steps(25) forwards}
@keyframes typing{from{width:0}to{width:100%}}

/* Event decorative icons */
#event-icon{position:absolute;font-size:2.5rem;z-index:45;pointer-events:none;opacity:0;transition:all .5s;animation:eventIconAnim 1.5s ease-out forwards}
#event-icon.show{opacity:1}
@keyframes eventIconAnim{0%{transform:translateY(20px)scale(.5);opacity:0}20%{opacity:1}100%{transform:translateY(-30px)scale(1.2);opacity:0}}

/* Particles */
#particles{position:absolute;inset:0;pointer-events:none;z-index:20}
.particle{position:absolute;width:6px;height:6px;border-radius:50%;pointer-events:none;animation:particleUp 1.2s ease-out forwards}
.particle.green{background:#7fff00;box-shadow:0 0 8px #7fff00}
.particle.yellow{background:#ffd700;box-shadow:0 0 8px #ffd700}
.particle.gold{background:#ffa500;box-shadow:0 0 10px #ffa500}
.particle.white{background:#fff;box-shadow:0 0 6px #fff}
.particle.purple{background:#b388ff;box-shadow:0 0 8px #b388ff}
.particle.blue{background:#64b5f6;box-shadow:0 0 8px #64b5f6}
.particle.red{background:#ff5252;box-shadow:0 0 8px #ff5252}
@keyframes particleUp{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-140px)scale(.2)}}

/* Ambient particles - per scene */
.ambient{position:absolute;border-radius:50%;pointer-events:none;z-index:1;animation:ambientFloat 5s ease-in-out infinite}
.ambient.a-default{width:3px;height:3px;background:rgba(255,255,255,.12)}
.ambient.a-firefly{width:4px;height:4px;background:rgba(255,255,150,.3);box-shadow:0 0 6px rgba(255,255,150,.2)}
.ambient.a-leaf{width:3px;height:6px;background:rgba(100,200,80,.15);border-radius:1px}
.ambient.a-sparkle{width:3px;height:3px;background:rgba(200,180,255,.2);box-shadow:0 0 4px rgba(200,180,255,.1)}
.ambient.a-star{width:2px;height:2px;background:rgba(255,255,255,.25);box-shadow:0 0 6px rgba(255,255,255,.1)}
.ambient.a-petal{width:4px;height:2px;background:rgba(255,200,200,.15);border-radius:2px}
@keyframes ambientFloat{0%,100%{transform:translateY(0)translateX(0);opacity:.15}25%{transform:translateY(-20px)translateX(8px);opacity:.4}50%{transform:translateY(-35px)translateX(-5px);opacity:.6}75%{transform:translateY(-15px)translateX(10px);opacity:.3}}

/* Achievement toast */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:300;background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,200,50,.05));border:1px solid rgba(255,215,0,.25);border-radius:12px;padding:12px 24px;font-size:.85rem;color:#ffd700;text-align:center;opacity:0;transition:opacity .5s;pointer-events:none;max-width:90%}
#toast.show{opacity:1}
#toast .sub{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:4px}

/* === SCENE BACKGROUNDS === */
.scene-0 #scene-bg{background:linear-gradient(180deg,#3a80c8 0%,#6ab0e8 18%,#87ceeb 28%,#b8e6b8 38%,#7ec850 44%,#5a9e38 60%,#4a8c2f 75%,#3d7a28)}
.scene-1 #scene-bg{background:linear-gradient(180deg,#15154a 0%,#1a2a5e 22%,#2d4a7e 30%,#3a6b9e 35%,#1a3a0f 38%,#2d5a1e 52%,#1a4a0f 70%,#0d2a05)}
.scene-2 #scene-bg{background:linear-gradient(180deg,#060620 0%,#0a0830 25%,#0d0840 45%,#120840 60%,#0d0d1a 80%,#0a0a12)}
.scene-3 #scene-bg{background:linear-gradient(180deg,#030314 0%,#080830 25%,#0d0d4a 50%,#15155e 70%,#0a0a3e)}
.scene-4 #scene-bg{background:linear-gradient(180deg,#15002a 0%,#2a0850 15%,#4a1a70 30%,#6a2a60 45%,#8B4513 58%,#B8860B 70%,#DAA520 80%,#FFD700 90%,#fff8dc)}

/* === SCENE 0: Mortal Village === */
.scene-0 .sun{position:absolute;top:6%;left:75%;width:40px;height:40px;background:radial-gradient(circle,#fff8b0,#ffd700 40%,transparent 70%);border-radius:50%;animation:sunGlow 3s ease-in-out infinite alternate}
@keyframes sunGlow{0%{box-shadow:0 0 15px rgba(255,215,0,.4);transform:scale(1)}100%{box-shadow:0 0 30px rgba(255,215,0,.7);transform:scale(1.05)}}
.scene-0 .sun-rays{position:absolute;top:6%;left:75%;width:60px;height:60px;background:radial-gradient(circle,transparent 30%,rgba(255,215,0,.06) 50%,transparent 70%);border-radius:50%;transform:translate(-10px,-10px);animation:rayRotate 12s linear infinite}
@keyframes rayRotate{0%{transform:translate(-10px,-10px)rotate(0)}100%{transform:translate(-10px,-10px)rotate(360deg)}}
.scene-0 .cloud{background:rgba(255,255,255,.55);border-radius:50%;width:70px;height:26px}
.scene-0 .cloud::before,.scene-0 .cloud::after{content:'';position:absolute;background:inherit;border-radius:50%}
.scene-0 .cloud::before{width:36px;height:36px;top:-15px;left:12px}
.scene-0 .cloud::after{width:26px;height:26px;top:-7px;right:10px}
.scene-0 .c1{left:12%;top:7%;animation:cDrift0 22s linear infinite}
.scene-0 .c2{right:15%;top:10%;width:55px;height:22px;animation:cDrift0 28s linear infinite reverse}
.scene-0 .c3{left:45%;top:4%;width:45px;height:18px;animation:cDrift0 18s linear infinite;animation-delay:-8s}
.scene-0 .c4{right:40%;top:13%;width:35px;height:14px;animation:cDrift0 20s linear infinite;animation-delay:-4s;opacity:.4}
@keyframes cDrift0{0%{transform:translateX(0)}100%{transform:translateX(130px)}}
.scene-0 .hut{bottom:26%;left:28%;font-size:3.2rem;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));z-index:3}
.scene-0 .hut-smoke{position:absolute;bottom:32%;left:32%;width:4px;height:10px;background:rgba(150,150,150,.12);border-radius:2px;animation:smokeRise 3s ease-out infinite}
@keyframes smokeRise{0%{transform:translateY(0)scaleX(1);opacity:.3}100%{transform:translateY(-30px)scaleX(2);opacity:0}}
.scene-0 .tree{bottom:26%;font-size:2rem;z-index:2}
.scene-0 .tree.t1{left:6%;font-size:2.4rem}
.scene-0 .tree.t2{right:8%;font-size:2rem}
.scene-0 .tree.t3{left:50%;font-size:1.6rem;bottom:27%}
.scene-0 .flower{font-size:1.3rem;animation:sway 3s ease-in-out infinite;z-index:4}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.scene-0 .flower.f1{bottom:30%;left:18%}
.scene-0 .flower.f2{bottom:32%;left:50%;font-size:1rem;animation-delay:.4s}
.scene-0 .flower.f3{bottom:28%;left:73%;font-size:1.2rem;animation-delay:.9s}
.scene-0 .flower.f4{bottom:31%;left:36%;font-size:.9rem;animation-delay:1.5s}
.scene-0 .fence{bottom:24.5%;left:42%;width:50px;height:2px;background:#8B4513;border-radius:1px;box-shadow:0 -8px 0 #8B4513,0 -16px 0 #8B4513,25px 0 0 #8B4513,25px -8px 0 #8B4513,25px -16px 0 #8B4513,50px 0 0 #8B4513,50px -8px 0 #8B4513}
.scene-0 .path{bottom:20%;left:44%;width:34px;height:20px;background:rgba(139,69,19,.12);border-radius:50%;box-shadow:0 6px 0 rgba(139,69,19,.08),0 12px 0 rgba(139,69,19,.06)}
.scene-0 .bird{font-size:1rem;animation:birdFly 14s ease-in-out infinite;z-index:5}
.scene-0 .bird.b1{top:14%;left:5%;animation-delay:-2s}
.scene-0 .bird.b2{top:17%;left:55%;animation-delay:-9s;font-size:.8rem}
@keyframes birdFly{0%,100%{transform:translate(0,0)}25%{transform:translate(50px,-12px)}50%{transform:translate(110px,5px)}75%{transform:translate(50px,-8px)}}
.scene-0 .grass{position:absolute;width:2px;height:10px;background:#4a8c2f;border-radius:1px;z-index:0}
.scene-0 .grass::after{content:'';position:absolute;bottom:0;left:-1px;width:4px;height:7px;background:#4a8c2f;border-radius:1px;transform:rotate(20deg);transform-origin:bottom}

/* === SCENE 1: Green Cloud Mountain === */
.scene-1 .mt{width:0;height:0}
.scene-1 .mt1{bottom:28%;left:6%;border-left:100px solid transparent;border-right:100px solid transparent;border-bottom:150px solid #2d5a1e;z-index:1}
.scene-1 .mt1::after{content:'';position:absolute;top:-112px;left:-30px;width:0;height:0;border-left:40px solid transparent;border-right:40px solid transparent;border-bottom:85px solid #fff;opacity:.1}
.scene-1 .mt2{bottom:24%;right:6%;border-left:80px solid transparent;border-right:80px solid transparent;border-bottom:115px solid #1a4a0f;z-index:1}
.scene-1 .mt2::after{content:'';position:absolute;top:-82px;left:-20px;width:0;height:0;border-left:25px solid transparent;border-right:25px solid transparent;border-bottom:60px solid #fff;opacity:.07}
.scene-1 .mt3{bottom:22%;left:36%;border-left:55px solid transparent;border-right:55px solid transparent;border-bottom:75px solid #3d6a2e;z-index:2}
.scene-1 .mt4{bottom:20%;left:60%;border-left:35px solid transparent;border-right:35px solid transparent;border-bottom:50px solid #2d5a1e;z-index:1;opacity:.7}
.scene-1 .wfall{bottom:30%;left:50%;transform:translateX(-50%);width:10px;height:85px;background:linear-gradient(180deg,rgba(135,206,250,.6),rgba(135,206,250,.08) 70%,transparent);border-radius:5px;z-index:3;animation:wfallAnim 2s ease-in-out infinite}
@keyframes wfallAnim{0%,100%{opacity:.4;height:85px}50%{opacity:1;height:100px}}
.scene-1 .wfall-mist{bottom:26%;left:47%;width:35px;height:10px;background:radial-gradient(ellipse,rgba(200,230,255,.18),transparent);z-index:4;animation:wfallMist 2.5s ease-in-out infinite}
@keyframes wfallMist{0%,100%{opacity:.2;transform:scaleX(1)}50%{opacity:.6;transform:scaleX(1.4)}}
.scene-1 .tr{font-size:2.2rem;z-index:3}
.scene-1 .tr.t1{bottom:24%;left:4%}
.scene-1 .tr.t2{bottom:22%;right:4%}
.scene-1 .tr.t3{bottom:26%;left:52%;font-size:1.8rem}
.scene-1 .tr.t4{bottom:20%;left:22%;font-size:1.5rem;z-index:4}
.scene-1 .cloud-fg{font-size:2.2rem;opacity:.55;animation:fgDrift 15s ease-in-out infinite;z-index:5}
@keyframes fgDrift{0%,100%{transform:translateX(0)}50%{transform:translateX(40px)}}
.scene-1 .cf1{top:6%;left:2%}
.scene-1 .cf2{top:15%;right:4%;animation-delay:-7s;font-size:1.8rem}
.scene-1 .cf3{top:20%;left:35%;animation-delay:-3s;font-size:1.4rem;opacity:.35}
.scene-1 .river{bottom:21%;left:0;right:0;height:5px;background:linear-gradient(90deg,transparent 8%,rgba(100,180,255,.2),rgba(100,180,255,.12) 55%,transparent 92%);border-radius:2px}
.scene-1 .bamboo{position:absolute;bottom:25%;width:5px;height:38px;background:linear-gradient(180deg,#2d5a1e,#4a8c2f 30%,#2d5a1e 60%,#3d6a2e);border-radius:2px;z-index:2}
.scene-1 .bamboo::before{content:'';position:absolute;top:40%;left:-2px;width:9px;height:2px;background:#3d6a2e;border-radius:1px}
.scene-1 .bamboo.b1{left:20%;height:42px}
.scene-1 .bamboo.b2{left:22%;height:32px;animation:bambooSway 3.5s ease-in-out infinite}
.scene-1 .bamboo.b3{left:66%;height:30px}
@keyframes bambooSway{0%,100%{transform:rotate(0)}50%{transform:rotate(4deg)}}
.scene-1 .path-up{position:absolute;bottom:22%;left:45%;width:28px;height:40px;background:rgba(139,119,69,.08);border-radius:4px;transform:skewX(-2deg);clip-path:polygon(10% 0,90% 0,100% 100%,0 100%)}

/* === SCENE 2: Cave Heaven === */
.scene-2 .cave-arch{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:180px;height:120px;background:radial-gradient(ellipse 70% 100% at 50% 100%,#060612 48%,transparent 50%);z-index:2;border-radius:90px 90px 0 0}
.scene-2 .cave-arch::before{content:'';position:absolute;bottom:0;left:-14px;right:-14px;height:20px;background:linear-gradient(90deg,#2a1008,#4a2010,#2a1008);border-radius:5px}
.scene-2 .cave-arch::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:5px;background:rgba(255,255,255,.03);border-radius:3px;box-shadow:0 25px 0 rgba(255,255,255,.02),0 50px 0 rgba(255,255,255,.01)}
.scene-2 .cave-inner{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:120px;height:95px;background:radial-gradient(ellipse at 50% 80%,#0a0a20,#040410);border-radius:0 0 55px 55px;z-index:1}
.scene-2 .crystal{font-size:1.5rem;z-index:4;animation:cryGlow 2.2s ease-in-out infinite alternate}
@keyframes cryGlow{0%{filter:drop-shadow(0 0 5px rgba(0,255,255,.3))}100%{filter:drop-shadow(0 0 20px rgba(0,255,255,.9))}}
.scene-2 .cr1{bottom:32%;left:18%;animation-delay:0s}
.scene-2 .cr2{bottom:34%;right:16%;animation-delay:-1.1s}
.scene-2 .cr3{bottom:42%;left:42%;font-size:1.1rem;animation-delay:-.5s}
.scene-2 .cr4{bottom:28%;left:52%;font-size:1.3rem;animation-delay:-1.6s}
.scene-2 .cr5{bottom:38%;left:28%;font-size:.9rem;animation-delay:-.8s;opacity:.7}
.scene-2 .mist{position:absolute;bottom:16%;left:0;right:0;height:65px;background:linear-gradient(0deg,rgba(80,120,255,.05),transparent);animation:mistPulse 5s ease-in-out infinite;z-index:3}
@keyframes mistPulse{0%,100%{opacity:.15}50%{opacity:.6}}
.scene-2 .light-ray{position:absolute;top:0;left:50%;transform:translateX(-50%)skewX(-8deg);width:80px;height:100%;background:linear-gradient(180deg,rgba(255,215,0,.1),transparent 60%);animation:rayPulse 3.5s ease-in-out infinite;z-index:0}
@keyframes rayPulse{0%,100%{opacity:.15}50%{opacity:.6}}
.scene-2 .orb{position:absolute;width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,rgba(180,200,255,.7),transparent);animation:orbFloat 4.5s ease-in-out infinite;z-index:3}
.scene-2 .orb.o1{bottom:52%;left:28%;animation-delay:0s}
.scene-2 .orb.o2{bottom:58%;right:22%;animation-delay:-2.2s;width:6px;height:6px}
.scene-2 .orb.o3{bottom:48%;left:58%;animation-delay:-1.1s;width:5px;height:5px}
.scene-2 .orb.o4{bottom:62%;left:42%;animation-delay:-3.3s;width:4px;height:4px}
@keyframes orbFloat{0%,100%{transform:translateY(0);opacity:.25}50%{transform:translateY(-30px);opacity:.85}}
.scene-2 .stalactite{position:absolute;top:0;width:0;height:0;z-index:1}
.scene-2 .stalactite.s1{left:28%;border-left:10px solid transparent;border-right:10px solid transparent;border-top:35px solid #0a0a2e}
.scene-2 .stalactite.s2{left:52%;border-left:7px solid transparent;border-right:7px solid transparent;border-top:25px solid #0a0a2e}
.scene-2 .stalactite.s3{left:18%;border-left:5px solid transparent;border-right:5px solid transparent;border-top:18px solid #0a0a2e}
.scene-2 .ground-glow{position:absolute;bottom:16%;left:32%;width:100px;height:35px;background:radial-gradient(ellipse,rgba(100,150,255,.06),transparent);z-index:0;animation:groundPulse 3.5s ease-in-out infinite}
@keyframes groundPulse{0%,100%{opacity:.2}50%{opacity:.6}}
.scene-2 .water-pool{position:absolute;bottom:14%;left:38%;width:50px;height:12px;background:radial-gradient(ellipse,rgba(100,180,255,.06),transparent);border-radius:50%;z-index:0;animation:poolRipple 4s ease-in-out infinite}
@keyframes poolRipple{0%,100%{transform:scaleX(1);opacity:.2}50%{transform:scaleX(1.2);opacity:.4}}

/* === SCENE 3: Nine Heavens === */
.scene-3 .star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle 2.5s ease-in-out infinite}
.scene-3 .star.s1{top:8%;left:12%;animation-delay:0s}
.scene-3 .star.s2{top:4%;right:22%;animation-delay:-.6s}
.scene-3 .star.s3{top:11%;left:48%;animation-delay:-1.2s;width:4px;height:4px}
.scene-3 .star.s4{top:2%;right:8%;animation-delay:-.3s}
.scene-3 .star.s5{top:18%;left:6%;animation-delay:-1s}
.scene-3 .star.s6{top:9%;left:70%;animation-delay:-1.8s}
.scene-3 .star.s7{top:21%;right:32%;animation-delay:-.5s;width:2px;height:2px}
.scene-3 .star.s8{top:15%;left:82%;animation-delay:-2.2s;width:2px;height:2px}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(2)}}
.scene-3 .shooting-star{position:absolute;top:5%;left:-20px;width:40px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6));border-radius:1px;animation:shootStar 8s linear infinite;animation-delay:3s}
@keyframes shootStar{0%{transform:translateX(0)translateY(0);opacity:0}5%{opacity:1}15%{transform:translateX(300px)translateY(50px);opacity:0}100%{transform:translateX(500px)translateY(80px);opacity:0}}
.scene-3 .nebula{position:absolute;top:2%;left:18%;width:160px;height:70px;background:radial-gradient(ellipse,rgba(100,50,180,.06),rgba(50,20,100,.03),transparent 70%);border-radius:50%;animation:nebulaPulse 7s ease-in-out infinite}
@keyframes nebulaPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.06)}}
.scene-3 .nebula2{top:15%;right:10%;width:100px;height:45px;background:radial-gradient(ellipse,rgba(80,100,200,.05),rgba(40,60,150,.02),transparent 70%);border-radius:50%;animation:nebulaPulse 7s ease-in-out infinite;animation-delay:-3.5s}
.scene-3 .plt{position:absolute;background:linear-gradient(180deg,rgba(150,180,255,.1),rgba(100,130,255,.05));border:1px solid rgba(150,180,255,.12);border-radius:6px;box-shadow:0 0 25px rgba(100,130,255,.05),inset 0 1px 0 rgba(255,255,255,.04)}
.scene-3 .plt.p1{bottom:52%;left:10%;width:90px;height:10px}
.scene-3 .plt.p2{bottom:40%;right:8%;width:70px;height:9px}
.scene-3 .plt.p3{bottom:60%;left:40%;width:60px;height:8px}
.scene-3 .plt.p4{bottom:32%;left:22%;width:50px;height:7px;opacity:.5}
.scene-3 .plt.p5{bottom:48%;left:62%;width:40px;height:6px;opacity:.4}
.scene-3 .lightning{font-size:1.6rem;opacity:0;animation:ltFlash 7s infinite}
@keyframes ltFlash{0%,94%,100%{opacity:0}95%{opacity:1;filter:drop-shadow(0 0 20px rgba(255,255,200,.7))}97%{opacity:0}}
.scene-3 .lt1{top:8%;right:20%;animation-delay:2.5s}
.scene-3 .lt2{top:5%;left:35%;animation-delay:5s;font-size:1.2rem}
.scene-3 .gate{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);z-index:3}
.scene-3 .gate::before{content:'\751F\95E8';position:absolute;bottom:0;left:50%;transform:translateX(-50%);padding:14px 34px;background:linear-gradient(135deg,rgba(200,170,255,.08),rgba(150,100,255,.05));border:1px solid rgba(200,170,255,.18);border-radius:14px 14px 0 0;font-size:1.1rem;color:rgba(200,170,255,.65);white-space:nowrap;box-shadow:0 -5px 25px rgba(150,100,255,.06)}
.scene-3 .gate::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:45px;border:1px solid rgba(200,170,255,.08);border-top:none;border-radius:0 0 40px 40px;bottom:-22px}
.scene-3 .moon{position:absolute;top:10%;left:72%;width:32px;height:32px;background:radial-gradient(circle at 35% 35%,#fff,#dde8ff 55%,transparent 70%);border-radius:50%;animation:moonGlow 4s ease-in-out infinite alternate}
@keyframes moonGlow{0%{box-shadow:0 0 10px rgba(200,220,255,.15)}100%{box-shadow:0 0 35px rgba(200,220,255,.45)}}
.scene-3 .cloud-wisp{position:absolute;background:rgba(150,180,255,.04);border-radius:50%;filter:blur(4px);animation:wispDrift 20s linear infinite}
.scene-3 .cloud-wisp.cw1{width:120px;height:20px;top:20%;left:-10%;animation-delay:0s}
.scene-3 .cloud-wisp.cw2{width:80px;height:15px;top:30%;left:-20%;animation-delay:-8s}
@keyframes wispDrift{0%{transform:translateX(0)}100%{transform:translateX(600px)}}

/* === SCENE 4: Immortal Realm === */
.scene-4 .gcloud{position:absolute;background:radial-gradient(circle,rgba(255,215,0,.2),rgba(255,200,50,.06) 50%,transparent 70%);border-radius:50%;animation:goldDrift 14s ease-in-out infinite}
@keyframes goldDrift{0%,100%{transform:translateX(0)scale(1)}50%{transform:translateX(40px)scale(1.04)}}
.scene-4 .gc1{width:160px;height:70px;top:5%;left:6%}
.scene-4 .gc2{width:110px;height:55px;top:13%;right:10%;animation-delay:-5s}
.scene-4 .gc3{width:200px;height:80px;top:21%;left:25%;animation-delay:-9s}
.scene-4 .gc4{width:90px;height:45px;top:30%;left:4%;animation-delay:-3s;opacity:.5}
.scene-4 .gc5{width:60px;height:30px;top:8%;left:55%;animation-delay:-7s;opacity:.4}
.scene-4 .palace{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);font-size:4rem;filter:drop-shadow(0 0 25px rgba(255,215,0,.2));animation:palaceGlow 3s ease-in-out infinite alternate;z-index:3}
@keyframes palaceGlow{0%{filter:drop-shadow(0 0 15px rgba(255,215,0,.15))}100%{filter:drop-shadow(0 0 55px rgba(255,215,0,.55))}}
.scene-4 .rainbow{position:absolute;bottom:14%;left:3%;right:3%;height:50px;background:linear-gradient(90deg,transparent 6%,rgba(255,0,0,.12),rgba(255,165,0,.12),rgba(255,255,0,.12),rgba(0,255,0,.12),rgba(0,150,255,.12),rgba(128,0,255,.12),transparent 94%);border-radius:25px;filter:blur(2px);animation:rainbowPulse 5s ease-in-out infinite}
@keyframes rainbowPulse{0%,100%{opacity:.25}50%{opacity:.65}}
.scene-4 .immortal{font-size:2rem;opacity:.45;animation:imFloat 8s ease-in-out infinite;z-index:2}
@keyframes imFloat{0%,100%{transform:translateY(0)rotate(0)}25%{transform:translateY(-18px)rotate(3deg)}50%{transform:translateY(-28px)rotate(-2deg)}75%{transform:translateY(-12px)rotate(2deg)}}
.scene-4 .im1{bottom:40%;left:12%;animation-delay:0s}
.scene-4 .im2{bottom:34%;right:14%;animation-delay:-4s;font-size:1.6rem}
.scene-4 .im3{bottom:48%;left:48%;animation-delay:-2s;font-size:1.4rem;opacity:.3}
.scene-4 .im4{bottom:28%;left:72%;animation-delay:-6s;font-size:1.2rem;opacity:.25}
.scene-4 .light-pillar{position:absolute;bottom:16%;width:22px;height:100px;background:linear-gradient(180deg,rgba(255,215,0,.06),transparent);border-radius:11px;z-index:1}
.scene-4 .lp1{left:22%;animation:pillarPulse 4.5s ease-in-out infinite}
.scene-4 .lp2{right:22%;animation:pillarPulse 4.5s ease-in-out infinite reverse;animation-delay:-2.25s}
.scene-4 .lp3{left:48%;width:14px;height:70px;animation:pillarPulse 4.5s ease-in-out infinite;animation-delay:-1.1s}
@keyframes pillarPulse{0%,100%{opacity:.2;transform:scaleX(1)}50%{opacity:.6;transform:scaleX(1.4)}}
.scene-4 .floating-petal{position:absolute;font-size:.7rem;opacity:.3;animation:petalFall 10s linear infinite;z-index:2}
.scene-4 .petal1{top:-10px;left:20%;animation-delay:0s}
.scene-4 .petal2{top:-10px;left:60%;animation-delay:-4s;font-size:.5rem}
@keyframes petalFall{0%{transform:translateY(0)translateX(0)rotate(0);opacity:.4}50%{transform:translateY(45vh)translateX(20px)rotate(180deg);opacity:.2}100%{transform:translateY(90vh)translateX(-10px)rotate(360deg);opacity:0}}

/* UI */
#ui{background:linear-gradient(180deg,#0d0d25,#080818);padding:8px 12px;flex-shrink:0;max-height:50%;display:flex;flex-direction:column}

#stats{display:flex;flex-wrap:wrap;align-items:center;gap:3px 8px;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:5px;font-size:.82rem;flex-shrink:0}
#stats .realm{font-weight:700;font-size:.92rem;min-width:68px;white-space:nowrap}
#stats .progress-wrap{flex:1;min-width:90px;display:flex;align-items:center;gap:5px}
#stats .progress-wrap .bar{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
#stats .progress-wrap .bar .fill{height:100%;background:linear-gradient(90deg,#7fff00,#ffd700);border-radius:3px;transition:width .6s}
#stats .progress-wrap .num{font-size:.72rem;color:rgba(255,255,255,.5);white-space:nowrap}
#stats .stat-item{display:inline-flex;align-items:center;gap:2px;color:rgba(255,255,255,.65);font-size:.78rem}
#stats .stat-item .val{color:#ffd700;font-weight:600}

#actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:5px;flex-shrink:0}
#actions .act{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.07);border-radius:8px;color:#e0dcd0;font-size:.82rem;padding:7px 4px;cursor:pointer;transition:all .2s;text-align:center;font-family:inherit;line-height:1.2}
#actions .act:hover{background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.03));border-color:rgba(255,215,0,.25)}
#actions .act:active{transform:scale(.95)}
#actions .act:disabled{opacity:.35;cursor:not-allowed;transform:none}
#actions .act.primary{border-color:rgba(255,215,0,.2);color:#ffd700}
#actions .act.danger{border-color:rgba(255,50,50,.15);color:#ff6b6b}
#actions .act.full{grid-column:1/-1}

#log{flex:1;min-height:55px;max-height:160px;overflow-y:auto;background:rgba(0,0,0,.4);border-radius:8px;padding:5px 10px;font-size:.78rem;line-height:1.5;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
#log::-webkit-scrollbar{width:3px}
#log::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
#log .entry{color:rgba(255,255,255,.65);border-bottom:1px solid rgba(255,255,255,.02);padding:2px 0}
#log .entry:last-child{border-bottom:none}
#log .entry.event{color:#ffd700}
#log .entry.breakthrough{color:#ff6b6b;font-weight:600}
#log .entry.system{color:rgba(150,200,255,.7)}

/* Modal */
#modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);align-items:center;justify-content:center;animation:modalIn .25s}
#modal.show{display:flex}
#modal .panel{background:linear-gradient(135deg,#1a1a3e,#0a0a2e);border:1px solid rgba(255,215,0,.15);border-radius:16px;padding:24px;max-width:340px;width:90%;max-height:80vh;overflow-y:auto}
#modal .panel h2{text-align:center;color:#ffd700;margin-bottom:14px;font-size:1.15rem}
#modal .panel .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem}
#modal .panel .row:last-child{border-bottom:none}
#modal .panel .row .label{color:rgba(255,255,255,.5)}
#modal .panel .row .value{color:#fff;font-weight:600}
#modal .panel .desc{font-size:.7rem;color:rgba(255,255,255,.35);text-align:center;margin-top:10px;padding:8px;background:rgba(0,0,0,.2);border-radius:6px;line-height:1.5}
#modal .panel .close{display:block;margin:14px auto 0;padding:8px 32px;background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,215,0,.08));border:1px solid rgba(255,215,0,.25);border-radius:8px;color:#ffd700;cursor:pointer;font-size:.85rem;font-family:inherit}
#modal .panel .close:hover{background:linear-gradient(135deg,rgba(255,215,0,.25),rgba(255,215,0,.12))}
#modal .panel .danger-btn{display:block;margin:10px auto 0;padding:6px 20px;background:rgba(255,50,50,.1);border:1px solid rgba(255,50,50,.2);border-radius:6px;color:#ff6b6b;cursor:pointer;font-size:.75rem;font-family:inherit}
#modal .panel .danger-btn:hover{background:rgba(255,50,50,.2)}
@keyframes modalIn{from{opacity:0}to{opacity:1}}

/* Event scene mods */
.event-monkey #character{transform:translateX(60%)scale(1.1)}
.event-monkey #scene-bg{filter:brightness(1.08);transition:filter .4s}
.event-beast #scene-bg{filter:hue-rotate(-15deg)brightness(.8);transition:filter .4s}
.event-beast #scene{animation:screenShake .15s ease 4}
@keyframes screenShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.event-sky #scene-bg{filter:hue-rotate(60deg)brightness(1.15)saturate(1.4);transition:filter 1s}
.event-demon #scene-bg{filter:brightness(.3)contrast(1.2);transition:filter .5s}
.event-demon #scene{animation:demonPulse 2s ease infinite}
@keyframes demonPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}

/* Auto-save indicator */
#save-indicator{position:fixed;bottom:8px;right:12px;font-size:.6rem;color:rgba(255,255,255,.1);z-index:150}
#save-indicator.saving{color:rgba(255,215,0,.3);transition:color .2s}

/* Toast */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:300;background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,200,50,.05));border:1px solid rgba(255,215,0,.25);border-radius:12px;padding:12px 24px;font-size:.85rem;color:#ffd700;text-align:center;opacity:0;transition:opacity .5s;pointer-events:none;max-width:90%}
#toast.show{opacity:1}
#toast .sub{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:4px}

/* Tutorial overlay */
#tutorial{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.8);align-items:center;justify-content:center;animation:modalIn .3s}
#tutorial.show{display:flex}
#tutorial .box{background:linear-gradient(135deg,#1a1a3e,#0a0a2e);border:1px solid rgba(255,215,0,.2);border-radius:16px;padding:28px 24px;max-width:360px;width:90%;text-align:center}
#tutorial .box h2{color:#ffd700;font-size:1.2rem;margin-bottom:12px}
#tutorial .box p{color:rgba(255,255,255,.7);font-size:.85rem;line-height:1.6;margin-bottom:6px}
#tutorial .box .keys{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:12px 0}
#tutorial .box .keys kbd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:3px 8px;font-size:.75rem;color:rgba(255,255,255,.6)}
#tutorial .box .btn{display:inline-block;margin-top:12px;padding:8px 32px;background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,215,0,.08));border:1px solid rgba(255,215,0,.25);border-radius:8px;color:#ffd700;cursor:pointer;font-size:.9rem;font-family:inherit}
#tutorial .box .btn:hover{background:linear-gradient(135deg,rgba(255,215,0,.25),rgba(255,215,0,.12))}

/* Responsive */
@media(min-width:600px){#app{max-width:480px;margin:0 auto;border-left:1px solid rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.04)}}
@media(max-height:640px){#character{font-size:2.2rem}#log{max-height:100px;min-height:40px}#actions .act{padding:5px 3px;font-size:.75rem}}
@media(max-width:360px){#actions .act{font-size:.72rem;padding:5px 2px}#stats{font-size:.72rem}#stats .realm{font-size:.8rem}}
</style>
</head>
<body>

<div id="app">
  <div id="scene">
    <div id="scene-bg"></div>
    <div id="scene-elements"></div>
    <div id="scene-wrap"></div>
    <div id="character">🧍</div>
    <div id="realm-label" class="show">凡人</div>
    <div id="event-icon"></div>
    <div id="particles"></div>
    <div id="flash"></div>
    <div id="event-overlay"><div id="event-text"></div></div>
  </div>
  <div id="ui">
    <div id="stats">
      <span class="realm" id="s-realm">🌟 凡人</span>
      <span class="progress-wrap">
        <span class="bar"><span class="fill" id="s-progress" style="width:0%"></span></span>
        <span class="num" id="s-num">0/100</span>
      </span>
      <span class="stat-item">💊 <span class="val" id="s-pills">0</span></span>
      <span class="stat-item">🧠 <span class="val" id="s-wisdom">5</span></span>
      <span class="stat-item">💪 <span class="val" id="s-talent">5</span></span>
    </div>
    <div id="actions">
      <button class="act primary" onclick="G.train()">🧘 修炼</button>
      <button class="act danger" onclick="G.breakthrough()">💥 突破</button>
      <button class="act" onclick="G.explore()">🌿 探索</button>
      <button class="act" onclick="G.refinePill()">💊 丹药</button>
      <button class="act full" onclick="G.showStatus()">📜 状态</button>
    </div>
    <div id="log"></div>
  </div>
</div>

<div id="modal">
  <div class="panel">
    <h2>📜 人物状态</h2>
    <div id="modal-body"></div>
    <div class="desc">快捷键: T修炼 B突破 E探索 P炼丹 S状态 Esc关闭</div>
    <button class="close" onclick="G.hideStatus()">关闭</button>
    <button class="danger-btn" onclick="G.resetGame()">🗑️ 重置存档</button>
  </div>
</div>

<div id="toast"></div>

<div id="tutorial">
  <div class="box">
    <h2>🌄 修真入道</h2>
    <p>点击 <b>修炼</b> 积累修为，修为满后点击 <b>突破</b> 提升境界。</p>
    <p>探索可获得随机机缘，炼丹可辅助突破。</p>
    <div class="keys">
      <kbd>T</kbd><kbd>修炼</kbd>
      <kbd>B</kbd><kbd>突破</kbd>
      <kbd>E</kbd><kbd>探索</kbd>
      <kbd>P</kbd><kbd>炼丹</kbd>
      <kbd>S</kbd><kbd>状态</kbd>
    </div>
    <button class="btn" onclick="G.closeTutorial()">开始修行</button>
  </div>
</div>

<div id="save-indicator"></div>

<script>
const G = {
  REALMS: [
    {name:'凡人',scene:0,req:0,reqNext:100,color:'#4CAF50'},
    {name:'练气',scene:1,req:100,reqNext:300,color:'#2196F3'},
    {name:'筑基',scene:1,req:300,reqNext:800,color:'#2196F3'},
    {name:'金丹',scene:2,req:800,reqNext:2000,color:'#9C27B0'},
    {name:'元婴',scene:2,req:2000,reqNext:5000,color:'#9C27B0'},
    {name:'化神',scene:3,req:5000,reqNext:12000,color:'#FF9800'},
    {name:'合体',scene:3,req:12000,reqNext:30000,color:'#FF9800'},
    {name:'大乘',scene:4,req:30000,reqNext:70000,color:'#E0E0E0'},
    {name:'飞升',scene:4,req:70000,reqNext:Infinity,color:'#FFD700'},
  ],
  EVENTS: [
    {name:'灵猴献果',desc:'一只灵猴从林中跃出，献上一枚灵气四溢的朱果。',icon:'🐵',
      effect:g=>{g.state.cultivation+=40+Math.floor(Math.random()*41);g.addLog('🌿 服下朱果，修为大增！','event')}},
    {name:'神秘老者',desc:'一位白须老者凭空出现，为你指点修行迷津。',icon:'👴',
      effect:g=>{g.state.wisdom++;g.state.cultivation+=20;g.addLog('📖 悟性提升！修为略微增长。','event')}},
    {name:'妖兽来袭',desc:'山林震动，一头妖兽朝你疯狂扑来！',icon:'🐉',
      effect:g=>{if(Math.random()>.3){g.state.cultivation+=50+Math.floor(Math.random()*51);g.addLog('⚔️ 击败妖兽，收获颇丰！','event');G.spawnParticlesG('green');}
      else{g.state.cultivation=Math.max(0,g.state.cultivation-40);G.charHurt();g.addLog('💀 不敌妖兽，修为受损...','event')}}},
    {name:'天降异象',desc:'天空骤然变色，九彩霞光笼罩大地！',icon:'🌈',
      effect:g=>{g.state.cultivation+=80+Math.floor(Math.random()*71);g.flashThen(h=>{h.addLog('🌈 天降异象！修为暴涨！','event')})}},
    {name:'古修遗迹',desc:'你发现了一处上古修士遗留的洞府。',icon:'🏺',
      effect:g=>{const p=1+Math.floor(Math.random()*3);g.state.pills+=p;g.addLog(`🏺 获得${p}枚丹药！`,'event')}},
    {name:'心魔入侵',desc:'内心深处的阴影涌现，试图吞噬你的神识！',icon:'👻',
      effect:g=>{if(Math.random()>.5){g.state.cultivation+=50;g.addLog('🧠 战胜心魔，道心更坚！','event')}
      else{g.state.cultivation=Math.max(0,g.state.cultivation-50);G.charHurt();g.addLog('😰 心魔侵蚀，修为倒退...','event')}}},
    {name:'仙鹤来访',desc:'一只仙鹤翩然而至，口中衔着一卷泛光古经。',icon:'🕊️',
      effect:g=>{g.state.wisdom++;g.state.cultivation+=35;g.addLog('📜 参悟古经，悟性与修为俱增！','event')}},
    {name:'灵泉沐浴',desc:'你发现一汪灵气盎然的碧色灵泉。',icon:'💧',
      effect:g=>{const b=30+Math.floor(Math.random()*31);g.state.cultivation+=b;g.addLog(`🛁 沐浴灵泉，获得${b}修为！`,'event')}},
  ],
  SAVE_KEY: 'semiTextSave',

  state: null,
  busy: false,
  saveTimer: null,

  init() {
    try{const d=localStorage.getItem(this.SAVE_KEY);if(d){const p=JSON.parse(d);if(p&&typeof p.cultivation=='number')this.state=p}}catch(e){}
    const isNew=!this.state||!this.state.logs;
    if(!this.state){
      this.state={cultivation:0,realm:0,pills:0,wisdom:5,talent:5,logs:[],saves:0,
        achievements:[],totalTrains:0,totalBreakthroughs:0,totalExplores:0,totalPills:0};
    }
    this.renderScene();
    this.updateUI();
    this.renderLog();
    this.updateBorder();
    this.updateRealmLabel();
    this.addLog('🌄 踏入修真之路...','system');
    this.addLog(`📍 当前境界：${this.realmData.name}`,'system');
    if(isNew)setTimeout(()=>this.openTutorial(),300);
    this.saveTimer=setInterval(()=>this.save(),30000);
    document.addEventListener('keydown',e=>this.handleKey(e));
  },

  handleKey(e) {
    if(e.key==='Escape'){if(document.getElementById('modal').classList.contains('show')){this.hideStatus();return}}
    if(document.getElementById('tutorial').classList.contains('show'))return;
    const k=e.key.toLowerCase();
    if(k==='t'&&!e.ctrlKey&&!e.metaKey)this.train();
    else if(k==='b')this.breakthrough();
    else if(k==='e')this.explore();
    else if(k==='p')this.refinePill();
    else if(k==='s'){e.preventDefault();if(document.getElementById('modal').classList.contains('show'))this.hideStatus();else this.showStatus()}
  },

  get realmData(){return this.REALMS[this.state.realm]},
  get maxRealm(){return this.state.realm>=this.REALMS.length-1},

  save() {
    try{localStorage.setItem(this.SAVE_KEY,JSON.stringify(this.state));
      const i=document.getElementById('save-indicator');i.textContent='✓ 已保存';i.className='saving';setTimeout(()=>{i.className=''},1500)}catch(e){}
  },

  /* Tutorial */
  openTutorial(){document.getElementById('tutorial').classList.add('show')},
  closeTutorial(){document.getElementById('tutorial').classList.remove('show')},

  /* Achievements */
  checkAchievements() {
    const s=this.state;
    const list=[
      {id:'first_train',name:'初入修炼',cond:()=>s.totalTrains>=1},
      {id:'ten_trains',name:'勤学苦练',cond:()=>s.totalTrains>=10},
      {id:'fifty_trains',name:'修行不辍',cond:()=>s.totalTrains>=50},
      {id:'first_bt',name:'初窥门径',cond:()=>s.totalBreakthroughs>=1},
      {id:'five_bt',name:'志在青云',cond:()=>s.totalBreakthroughs>=5},
      {id:'first_explore',name:'行者无疆',cond:()=>s.totalExplores>=1},
      {id:'ten_explore',name:'历遍山河',cond:()=>s.totalExplores>=10},
      {id:'first_pill',name:'炼丹初成',cond:()=>s.totalPills>=1},
      {id:'fifty_pills',name:'丹道大家',cond:()=>s.totalPills>=50},
      {id:'cult_1000',name:'修为小成',cond:()=>s.cultivation>=1000},
      {id:'cult_10000',name:'修为大成',cond:()=>s.cultivation>=10000},
      {id:'max_realm',name:'飞升成功',cond:()=>this.maxRealm},
    ];
    list.forEach(a=>{if(!s.achievements.includes(a.id)&&a.cond()){s.achievements.push(a.id);this.showToast(`🏆 成就达成：${a.name}`)}});
  },

  showToast(msg,sub='') {
    const t=document.getElementById('toast');
    t.innerHTML=msg+(sub?`<div class="sub">${sub}</div>`:'');
    t.className='show';
    clearTimeout(this._toastTimer);
    this._toastTimer=setTimeout(()=>{t.className=''},2500);
  },

  train() {
    if(this.busy)return;
    this.busy=true;
    this.state.totalTrains=(this.state.totalTrains||0)+1;
    const gain=Math.floor((5+Math.random()*11)*(1+this.state.wisdom*0.12));
    this.state.cultivation+=gain;
    document.getElementById('character').textContent='🧘';
    document.getElementById('character').className='training';
    this.spawnTrainParticles();
    this.addLog(`🧘 修炼中，获得 ${gain} 修为`,'system');
    this.updateUI();
    this.checkAchievements();
    this.save();
    setTimeout(()=>{
      document.getElementById('character').textContent='🧍';
      document.getElementById('character').className='';
      this.busy=false;
    },1100);
  },

  breakthrough() {
    if(this.busy||this.maxRealm)return;
    const d=this.realmData;
    if(this.state.cultivation<d.reqNext){
      this.addLog(`⚠️ 修为不足，还需${d.reqNext-this.state.cultivation}修为才能突破`,'system');
      return;
    }
    this.busy=true;
    let chance=30+this.state.talent*4;
    if(this.state.pills>0&&Math.random()<.7){
      chance+=25;this.state.pills--;
      this.addLog('💊 消耗一枚丹药辅助突破！','system');
    }
    if(Math.random()*100<chance){
      this.doBreakthrough();
    }else{
      const cons=20+Math.floor(Math.random()*40);
      this.state.cultivation+=cons;
      this.addLog(`💥 突破失败！积累了${cons}修为经验`,'system');
      this.updateUI();
      this.checkAchievements();
      this.save();
      this.busy=false;
    }
  },

  doBreakthrough() {
    const oldScene=this.realmData.scene;
    this.state.realm++;
    this.state.totalBreakthroughs=(this.state.totalBreakthroughs||0)+1;
    const nr=this.realmData;
    const ns=nr.scene;
    this.addLog(`🎉 突破成功！晋入 ${nr.name} 期！`,'breakthrough');
    document.getElementById('character').textContent='🧘';
    document.getElementById('character').className='glow';
    const fl=document.getElementById('flash');
    fl.className='active';
    if(ns!==oldScene){const sw=document.getElementById('scene-wrap');sw.className='active';sw.innerHTML='<div class="swirl"></div>'}
    setTimeout(()=>{
      if(ns!==oldScene){this.renderScene();document.getElementById('scene-wrap').className=''}
      this.updateUI();
      this.updateBorder();
      this.updateRealmLabel();
      this.checkAchievements();
      this.save();
      fl.className='fade';
      setTimeout(()=>{
        fl.className='';
        document.getElementById('character').textContent='🧍';
        document.getElementById('character').className='';
        this.busy=false;
      },500);
    },500);
  },

  explore() {
    if(this.busy)return;
    this.busy=true;
    this.state.totalExplores=(this.state.totalExplores||0)+1;
    const evt=this.EVENTS[Math.floor(Math.random()*this.EVENTS.length)];
    const sc=document.getElementById('scene');
    document.getElementById('character').className='exploring';
    document.getElementById('character').textContent='🚶';
    this.addLog(`🌿 ${evt.name}`,'event');
    this.showEventText(evt.desc);
    this.showEventIcon(evt.icon||'✨');
    const cls=this.eventClass(evt.name);
    if(cls)sc.classList.add(cls);
    setTimeout(()=>{
      evt.effect(this);
      if(cls)sc.classList.remove(cls);
      this.updateUI();
      this.checkAchievements();
      this.save();
      setTimeout(()=>{
        document.getElementById('character').className='';
        document.getElementById('character').textContent='🧍';
        this.hideEventIcon();
        this.hideEventText();
        this.busy=false;
      },400);
    },1400);
  },

  eventClass(n){
    const m={'灵猴献果':'event-monkey','妖兽来袭':'event-beast','天降异象':'event-sky','心魔入侵':'event-demon'};
    return m[n]||'';
  },

  showEventIcon(emoji){
    const el=document.getElementById('event-icon');
    el.textContent=emoji;
    el.style.position='absolute';
    el.style.top='35%';
    el.style.left='30%';
    el.style.fontSize='2.8rem';
    el.style.animation='none';
    void el.offsetHeight;
    el.style.animation='eventIconAnim 1.5s ease-out forwards';
    el.classList.add('show');
  },

  hideEventIcon(){document.getElementById('event-icon').classList.remove('show')},

  charHurt(){
    document.getElementById('character').className='hurt';
    setTimeout(()=>{if(!document.getElementById('character').classList.contains('training'))document.getElementById('character').className=''},800);
  },

  refinePill() {
    if(this.busy)return;
    if(this.state.cultivation<100){
      this.addLog('⚠️ 修为不足100，无法炼制丹药','system');
      return;
    }
    this.busy=true;
    this.state.cultivation-=100;
    this.state.pills++;
    this.state.totalPills=(this.state.totalPills||0)+1;
    this.addLog('💊 消耗100修为，炼制一枚丹药','system');
    this.updateUI();
    this.checkAchievements();
    this.save();
    setTimeout(()=>{this.busy=false},300);
  },

  showStatus() {
    const s=this.state,rd=this.realmData;
    const rn=s.realm<this.REALMS.length-1?`${rd.name}期`:'🌟已飞升！';
    const pct=s.realm<this.REALMS.length-1?((s.cultivation-rd.req)/(rd.reqNext-rd.req)*100).toFixed(1):'100';
    const chance=s.realm<this.REALMS.length-1?`${Math.min(100,30+s.talent*4+(s.pills>0?25:0))}%`:'-';
    const ach=!s.achievements||s.achievements.length===0?'暂无':`${s.achievements.length}个`;
    document.getElementById('modal-body').innerHTML=[
      ['🌟 境界',rn],
      ['⚡ 修为',`${s.cultivation}`],
      ['📊 进度',s.realm<this.REALMS.length-1?`${pct}% (${s.cultivation}/${rd.reqNext})`:'已至巅峰'],
      ['💊 丹药',`${s.pills}枚`],
      ['🧠 悟性',`${s.wisdom}（修炼速度×${((1+s.wisdom*0.12)*10|0)/10}）`],
      ['💪 根骨',`${s.talent}（突破基础率${30+s.talent*4}%）`],
      ['🎯 突破率',chance],
      ['', ''],
      ['📈 修炼次数',`${s.totalTrains||0}次`],
      ['🗺️ 探索次数',`${s.totalExplores||0}次`],
      ['🔥 突破次数',`${s.totalBreakthroughs||0}次`],
      ['🏆 成就',ach],
    ].map(([l,v])=>l?`<div class="row"><span class="label">${l}</span><span class="value">${v}</span></div>`:'<div style="height:4px"></div>').join('');
    document.getElementById('modal').classList.add('show');
  },

  hideStatus(){document.getElementById('modal').classList.remove('show')},

  resetGame() {
    if(!confirm('确定要重置所有存档吗？所有进度将丢失！'))return;
    this.state={cultivation:0,realm:0,pills:0,wisdom:5,talent:5,logs:[],saves:0,
      achievements:[],totalTrains:0,totalBreakthroughs:0,totalExplores:0,totalPills:0};
    this.renderScene();
    this.updateUI();
    this.renderLog();
    this.updateBorder();
    this.updateRealmLabel();
    this.hideStatus();
    this.addLog('🔄 轮回重启，一切从头...','breakthrough');
    this.save();
  },

  addLog(msg,type='') {
    this.state.logs.push({msg,type});
    if(this.state.logs.length>80)this.state.logs.splice(0,this.state.logs.length-80);
    this.renderLog();
  },

  renderLog() {
    const el=document.getElementById('log');
    el.innerHTML=this.state.logs.slice(-30).map(l=>{
      const ic=l.type==='event'?'🌟':l.type==='breakthrough'?'✨':l.type==='system'?'•':'•';
      return `<div class="entry ${l.type}"><span style="display:inline-block;width:16px">${ic}</span>${l.msg}</div>`;
    }).join('');
    el.scrollTop=el.scrollHeight;
  },

  showEventText(t) {
    const el=document.getElementById('event-text');
    el.textContent=t;
    el.style.animation='none';
    void el.offsetHeight;
    el.style.animation='typing .6s steps(25) forwards';
    document.getElementById('event-overlay').classList.add('active');
  },

  hideEventText(){document.getElementById('event-overlay').classList.remove('active')},

  flashThen(cb) {
    const fl=document.getElementById('flash');
    fl.className='active';
    setTimeout(()=>{
      fl.className='fade';
      setTimeout(()=>{fl.className=''},500);
    },300);
    setTimeout(()=>cb(this),250);
  },

  spawnParticlesG(color){
    const c=document.getElementById('particles');
    const cr=document.getElementById('character').getBoundingClientRect();
    const sr=document.getElementById('scene').getBoundingClientRect();
    const cx=cr.left-sr.left+cr.width/2;
    const cy=cr.top-sr.top+cr.height/3;
    for(let i=0;i<5;i++){
      const p=document.createElement('div');
      p.className=`particle ${color}`;
      p.style.left=(cx-3+Math.random()*20-10)+'px';
      p.style.top=(cy+Math.random()*10-5)+'px';
      p.style.animationDuration=(.8+Math.random()*.6)+'s';
      p.style.animationDelay=(Math.random()*.3)+'s';
      c.appendChild(p);
      setTimeout(()=>p.remove(),2000);
    }
  },

  updateUI() {
    const s=this.state,rd=this.realmData;
    document.getElementById('s-realm').textContent=`🌟 ${rd.name}`;
    if(!this.maxRealm){
      const pct=Math.max(0,Math.min(100,(s.cultivation-rd.req)/(rd.reqNext-rd.req)*100));
      document.getElementById('s-progress').style.width=pct+'%';
      document.getElementById('s-num').textContent=`${s.cultivation}/${rd.reqNext}`;
    }else{
      document.getElementById('s-progress').style.width='100%';
      document.getElementById('s-num').textContent='已飞升！';
    }
    document.getElementById('s-pills').textContent=s.pills;
    document.getElementById('s-wisdom').textContent=s.wisdom;
    document.getElementById('s-talent').textContent=s.talent;
  },

  updateBorder() {
    const cl=['#4CAF50','#4CAF50','#2196F3','#2196F3','#9C27B0','#9C27B0','#FF9800','#FF9800','#FFD700'];
    document.getElementById('scene').style.borderColor=cl[this.state.realm]||'#4CAF50';
  },

  updateRealmLabel() {
    const el=document.getElementById('realm-label');
    el.textContent=this.realmData.name;
    el.className='show';
  },

  renderScene() {
    const idx=this.realmData.scene;
    const el=document.getElementById('scene-elements');
    const ch=document.getElementById('character');
    el.className=`scene-${idx}`;
    ch.className='';
    ch.classList.add(`pos-scene${idx}`);
    let h='';
    if(idx===0){
      h+=`<div class="sun"></div><div class="sun-rays"></div>`;
      h+=`<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="cloud c4"></div>`;
      h+=`<div class="hut">🏠</div><div class="hut-smoke"></div>`;
      h+=`<div class="tree t1">🌲</div><div class="tree t2">🌳</div><div class="tree t3">🌲</div>`;
      h+=`<div class="flower f1">🌺</div><div class="flower f2">🌸</div><div class="flower f3">🌺</div><div class="flower f4">🌸</div>`;
      h+=`<div class="fence"></div><div class="path"></div>`;
      h+=`<div class="bird b1">🐦</div><div class="bird b2">🐦</div>`;
      for(let i=0;i<6;i++)h+=`<div class="grass" style="left:${10+i*14}%;bottom:${21+Math.random()*3}%;height:${7+Math.floor(Math.random()*5)}px"></div>`;
    }else if(idx===1){
      h+=`<div class="mt mt1"></div><div class="mt mt2"></div><div class="mt mt3"></div><div class="mt mt4"></div>`;
      h+=`<div class="wfall"></div><div class="wfall-mist"></div>`;
      h+=`<div class="tr t1">🌲</div><div class="tr t2">🌳</div><div class="tr t3">🌲</div><div class="tr t4">🌳</div>`;
      h+=`<div class="cloud-fg cf1">☁️</div><div class="cloud-fg cf2">☁️</div><div class="cloud-fg cf3">☁️</div>`;
      h+=`<div class="river"></div><div class="path-up"></div>`;
      h+=`<div class="bamboo b1"></div><div class="bamboo b2"></div><div class="bamboo b3"></div>`;
    }else if(idx===2){
      h+=`<div class="cave-arch"></div><div class="cave-inner"></div>`;
      h+=`<div class="crystal cr1">💎</div><div class="crystal cr2">💎</div><div class="crystal cr3">💎</div><div class="crystal cr4">💎</div><div class="crystal cr5">💎</div>`;
      h+=`<div class="mist"></div><div class="light-ray"></div>`;
      h+=`<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><div class="orb o4"></div>`;
      h+=`<div class="stalactite s1"></div><div class="stalactite s2"></div><div class="stalactite s3"></div>`;
      h+=`<div class="ground-glow"></div><div class="water-pool"></div>`;
    }else if(idx===3){
      h+=`<div class="shooting-star"></div>`;
      h+=`<div class="star s1"></div><div class="star s2"></div><div class="star s3"></div><div class="star s4"></div><div class="star s5"></div><div class="star s6"></div><div class="star s7"></div><div class="star s8"></div>`;
      h+=`<div class="nebula"></div><div class="nebula2"></div>`;
      h+=`<div class="plt p1"></div><div class="plt p2"></div><div class="plt p3"></div><div class="plt p4"></div><div class="plt p5"></div>`;
      h+=`<div class="lightning lt1">⚡</div><div class="lightning lt2">⚡</div>`;
      h+=`<div class="gate"></div><div class="moon"></div>`;
      h+=`<div class="cloud-wisp cw1"></div><div class="cloud-wisp cw2"></div>`;
    }else if(idx===4){
      h+=`<div class="gcloud gc1"></div><div class="gcloud gc2"></div><div class="gcloud gc3"></div><div class="gcloud gc4"></div><div class="gcloud gc5"></div>`;
      h+=`<div class="palace">🏛️</div>`;
      h+=`<div class="rainbow"></div>`;
      h+=`<div class="immortal im1">🧚</div><div class="immortal im2">🧚</div><div class="immortal im3">🧚</div><div class="immortal im4">🧚</div>`;
      h+=`<div class="light-pillar lp1"></div><div class="light-pillar lp2"></div><div class="light-pillar lp3"></div>`;
      h+=`<div class="floating-petal petal1">🌸</div><div class="floating-petal petal2">🌸</div>`;
    }
    el.innerHTML=h;
    this.spawnAmbient();
  },

  spawnTrainParticles() {
    const c=document.getElementById('particles');
    const cr=document.getElementById('character').getBoundingClientRect();
    const sr=document.getElementById('scene').getBoundingClientRect();
    const cx=cr.left-sr.left+cr.width/2;
    const cy=cr.top-sr.top+cr.height/3;
    const realmColors=[['green','yellow','gold'],['green','blue','white'],['purple','blue','white'],['white','gold','purple'],['gold','white','yellow']];
    const palette=realmColors[this.realmData.scene]||['green','yellow','gold'];
    for(let i=0;i<8;i++){
      const p=document.createElement('div');
      p.className=`particle ${palette[i%palette.length]}`;
      p.style.left=(cx-5+Math.random()*28-12)+'px';
      p.style.top=(cy+Math.random()*16-8)+'px';
      p.style.animationDuration=(.7+Math.random()*.8)+'s';
      p.style.animationDelay=(Math.random()*.5)+'s';
      c.appendChild(p);
      setTimeout(()=>p.remove(),2200);
    }
  },

  spawnAmbient() {
    const el=document.getElementById('scene-elements');
    const sceneIdx=this.realmData.scene;
    const types=['a-default','a-firefly','a-leaf','a-sparkle','a-star','a-petal'];
    const pool=[0,1,3,4,5,6];
    const typeIdx=pool[sceneIdx]||0;
    const baseType=types[typeIdx]||'a-default';
    const count=12+sceneIdx*2;
    for(let i=0;i<count;i++){
      const a=document.createElement('div');
      a.className=`ambient ${baseType}`;
      a.style.left=(Math.random()*94+3)+'%';
      a.style.top=(Math.random()*82+4)+'%';
      a.style.animationDelay=(Math.random()*6)+'s';
      a.style.animationDuration=(3.5+Math.random()*4.5)+'s';
      el.appendChild(a);
    }
  },
};

document.addEventListener('DOMContentLoaded',()=>G.init());
</script>
</body>
</html>
